<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Figura — math diagram maker</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #e2e5ea;
    --ink: #1f2330;
    --muted: #6b7280;
    --accent: #534ab7;
    --accent-soft: #eeedfe;
    --teal: #1d9e75;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Lexend", system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); }
  body { display: flex; flex-direction: column; -webkit-user-select: none; user-select: none; }
  input, textarea, select, [contenteditable], .mq-editable-field, .mq-editable-field * { -webkit-user-select: text; user-select: text; }

  header {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; row-gap: 6px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  .tabbar { display: flex; align-items: flex-end; gap: 5px; padding: 7px 12px 0; min-height: 46px;
    background: var(--panel); border-top: 1px solid var(--border); overflow-x: auto; }
  .tab { display: flex; align-items: center; gap: 9px; padding: 10px 18px; border: 1px solid var(--border);
    border-bottom: none; border-radius: 9px 9px 0 0; background: var(--bg); cursor: pointer; font-size: 14px;
    white-space: nowrap; min-width: 84px; justify-content: center; }
  .tab.active { background: #fff; color: var(--accent); font-weight: 500; box-shadow: 0 -2px 6px rgba(0,0,0,.04); }
  .tab .tab-x { color: var(--muted); font-size: 16px; line-height: 1; padding: 0 3px; border-radius: 3px; }
  .tab .tab-x:hover { background: #fdeeee; color: #a32d2d; }
  .tab-add { border: 1px solid var(--border); background: #fff; border-radius: 8px; width: 34px; height: 34px;
    cursor: pointer; font-size: 19px; color: var(--ink); flex: none; }
  .tab-add:hover { background: #f3f4f6; }
  .ctxmenu { position: fixed; z-index: 1000; background: #fff; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.14); padding: 5px; min-width: 160px; display: none; }
  .ctxmenu button { display: block; width: 100%; text-align: left; border: none; background: transparent;
    padding: 8px 10px; border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px; color: var(--ink); }
  .ctxmenu button:hover { background: var(--bg); }
  .ctxmenu .ctx-colors { display: flex; gap: 6px; padding: 8px 10px; flex-wrap: wrap; }
  .ctxmenu .ctx-colors span { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,.15); }
  .ctxmenu .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .lib-modal { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; }
  .lib-box { background: #fff; border-radius: 12px; width: min(720px, 92vw); max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
  .lib-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .lib-head b { font-size: 17px; flex: 1; }
  .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 18px; overflow-y: auto; }
  .lib-item { border: 1px solid var(--border); border-radius: 9px; overflow: hidden; cursor: pointer; position: relative; background: #fff; }
  .lib-item:hover { border-color: var(--accent); }
  .lib-item img { width: 100%; height: 110px; object-fit: contain; background: #fafafa; display: block; }
  .lib-item .lib-name { padding: 7px 9px; font-size: 13px; border-top: 1px solid var(--border); }
  .lib-item .lib-del { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.9); cursor: pointer; font-size: 14px; color: #a32d2d; }
  .lib-empty { padding: 30px; color: var(--muted); text-align: center; grid-column: 1/-1; }
  .prompt-box { background: #fff; border-radius: 12px; width: min(380px, 92vw); padding: 20px 22px; }
  .prompt-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .prompt-box input { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 15px; }
  .prompt-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .prompt-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .cp-l { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
  .cp-l input { padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo svg { display: block; }
  .logo .brand { font-family: "Manrope", sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
  header .spacer { flex: 1; }
  header button, .tool, .panel button { font: inherit; }

  .topbtn {
    border: 1px solid var(--border); background: #fff; border-radius: 8px;
    padding: 7px 12px; cursor: pointer; color: var(--ink); display: inline-flex; align-items: center; gap: 6px;
  }
  .topbtn:hover { background: #f7f8fa; }
  .topbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topbtn.primary:hover { background: #463fa0; }

  main { flex: 1; display: flex; min-height: 0; }

  /* left toolbar */
  .toolbar {
    width: 132px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px; padding: 10px 9px; overflow-y: auto;
  }
  .toolcat { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--accent);
    margin: 13px 2px 4px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
  .toolcat:first-child { margin-top: 2px; }
  .toolbar-resizer, .panel-resizer { flex: none; width: 6px; cursor: col-resize; background: transparent; }
  .toolbar-resizer:hover, .toolbar-resizer.dragging, .panel-resizer:hover, .panel-resizer.dragging { background: var(--accent-soft); }
  .tool {
    border: 1px solid transparent; background: transparent; border-radius: 8px;
    padding: 9px 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px;
    color: var(--muted); font-size: 11.5px;
  }
  .tool:hover { background: #f3f4f6; color: var(--ink); }
  .tool.active { background: var(--accent-soft); color: var(--accent); border-color: #d9d6f7; }
  .tool svg { width: 27px; height: 27px; }

  /* canvas */
  .canvas-wrap { flex: 1; position: relative; display: flex; overflow: auto; padding: 24px; }
  #board { background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); touch-action: none; margin: auto; }
  .zoomctl { position: absolute; right: 16px; bottom: 16px; display: flex; align-items: center; gap: 2px;
    background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 2px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .zoomctl button { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; font-size: 18px; border-radius: 6px; color: var(--ink); }
  .zoomctl button:hover { background: #f3f4f6; }
  .zoomctl span { min-width: 46px; text-align: center; font-size: 12px; color: var(--muted); }
  .mqfield { display: block; width: 100%; min-height: 36px; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 8px; background: #fff; font-size: 17px; }
  .mqfield.mq-focused { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .fmt-row { display: flex; gap: 4px; margin: 8px 0; }
  .fmt-row button { flex: 1; border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 6px 0; cursor: pointer; font-size: 14px; }
  .fmt-row button.on { background: var(--accent-soft); color: var(--accent); border-color: #d9d6f7; }
  .fmt-row button:hover { background: #f7f8fa; }
  .wt-input { border: none; background: transparent; outline: none; text-align: center; font: inherit;
    color: #1f2330; padding: 0; box-sizing: border-box; }
  .wt-input.wt-empty { border: 1px dashed #534ab7; background: #fff; border-radius: 4px; }
  .wt-input:focus { border: 1px solid var(--accent); background: #fff; border-radius: 4px; }

  /* right panel */
  .panel {
    width: 250px; background: var(--panel); border-left: 1px solid var(--border);
    padding: 14px; overflow-y: auto;
  }
  .panel h3 { margin: 0 0 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .panel .empty { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .field { margin: 12px 0; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input[type=text], .field input[type=number] {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font: inherit;
  }
  .field .row { display: flex; gap: 8px; align-items: center; }
  .field input[type=color] { width: 36px; height: 30px; padding: 0; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .field input[type=range] { width: 100%; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 8px 0; }
  .panel .danger { width: 100%; margin-top: 14px; border: 1px solid #f0caca; background: #fdeeee; color: #a32d2d; border-radius: 8px; padding: 8px; cursor: pointer; }
  .panel .danger:hover { background: #fbe2e2; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 6px; cursor: pointer; font-size: 12px; }
  .seg button:hover { background: #f7f8fa; }

  .hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: #1f2330; color: #fff; font-size: 12px; padding: 6px 12px; border-radius: 20px; opacity: .9; }
  .panel .hinttext { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .panel .hinttext code { background: #f1f1f4; padding: 1px 4px; border-radius: 3px; }
  .smq { font-size: 15px; color: var(--ink); }
  .smq .mq-root-block { padding: 0; }
  .mk { margin: 6px 0 12px; }
  .mk-toggle { width: 100%; display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 6px;
    padding: 9px 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .mk-toggle:hover { background: #463fa0; }
  .mk-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; padding: 8px; }
  .mk-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .mk-chip { border: 1px solid var(--border); background: #fff; border-radius: 12px; padding: 2px 8px;
    font-size: 11px; cursor: pointer; color: var(--muted); }
  .mk-chip:hover { background: #f3f4f6; }
  .mk-chip.on { background: var(--accent-soft); color: var(--accent); border-color: #d9d6f7; }
  .mk-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
  .mk-key { border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 7px 0;
    font-size: 16px; cursor: pointer; line-height: 1; }
  .mk-key:hover { background: var(--accent-soft); border-color: #d9d6f7; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" href="favicon.svg" type="image/svg+xml">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script>
  window.MathJax = { tex: {}, svg: { fontCache: "none" }, startup: { typeset: false } };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.js"></script>

<body>
  <header>
    <a class="logo" href="index.html" title="Figura home" style="text-decoration:none">
      <svg width="30" height="30" viewBox="0 0 48 48" aria-hidden="true"><g stroke="#cbc8ea" stroke-width="2.2" stroke-linecap="round"><line x1="13" y1="24" x2="24" y2="13"/><line x1="24" y1="13" x2="35" y2="24"/><line x1="35" y1="24" x2="24" y2="35"/><line x1="24" y1="35" x2="13" y2="24"/></g><circle cx="13" cy="24" r="3.7" fill="#1d9e75"/><circle cx="24" cy="13" r="3.7" fill="#534ab7"/><circle cx="35" cy="24" r="3.7" fill="#e0973a"/><circle cx="24" cy="35" r="3.7" fill="#d4537e"/></svg>
      <span class="brand">Figura</span>
    </a>
    <div class="spacer"></div>
    <button class="topbtn" id="btn-undo" title="Undo (Ctrl+Z)">↶</button>
    <button class="topbtn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">↷</button>
    <button class="topbtn" id="btn-dup" title="Duplicate selection (Ctrl+D)">Duplicate</button>
    <button class="topbtn" id="btn-new" title="New canvas (tab)">New</button>
    <button class="topbtn" id="btn-save" title="Save to this browser">Save</button>
    <button class="topbtn" id="btn-load" title="Load saved work">Load</button>
    <button class="topbtn" id="btn-image" title="Import an image onto the canvas">Image</button>
    <button class="topbtn" id="btn-svg">Export SVG</button>
    <button class="topbtn" id="btn-copy">Copy image</button>
    <button class="topbtn primary" id="btn-png">Download PNG</button>
  </header>

  <main>
    <nav class="toolbar" id="toolbar">
      <!-- tools injected by JS -->
    </nav>
    <div class="toolbar-resizer" id="toolbar-resizer" title="Drag to resize"></div>

    <div class="canvas-wrap">
      <svg id="board" width="880" height="640" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="zoomctl">
        <button id="zoom-out" title="Zoom out">−</button>
        <span id="zoom-label">100%</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-reset" title="Reset zoom" style="font-size:13px">⤢</button>
      </div>
    </div>

    <div class="panel-resizer" id="panel-resizer" title="Drag to resize"></div>
    <aside class="panel" id="panel">
      <div class="empty">Pick a tool on the left, then click the canvas to add a shape.<br><br>Click a shape to select it. Drag it to move, drag its handles to reshape. Press <b>Delete</b> to remove.</div>
    </aside>
  </main>

  <div class="tabbar" id="tabbar"></div>

  <div class="ctxmenu" id="tab-ctx">
    <button data-act="rename">Rename</button>
    <button data-act="duplicate">Duplicate</button>
    <div class="ctx-sep"></div>
    <div class="ctx-colors" id="ctx-colors"></div>
    <div class="ctx-sep"></div>
    <button data-act="delete" style="color:#a32d2d">Delete</button>
  </div>

  <div class="lib-modal" id="prompt-modal">
    <div class="prompt-box">
      <div class="prompt-title" id="prompt-title">Rename</div>
      <input type="text" id="prompt-input" autocomplete="off">
      <div class="prompt-actions">
        <button class="topbtn" id="prompt-cancel">Cancel</button>
        <button class="topbtn primary" id="prompt-ok">OK</button>
      </div>
    </div>
  </div>

  <div class="lib-modal" id="confirm-modal">
    <div class="prompt-box">
      <div class="prompt-title" id="confirm-msg">Are you sure?</div>
      <div class="prompt-actions">
        <button class="topbtn" id="confirm-cancel">Cancel</button>
        <button class="topbtn primary" id="confirm-ok">OK</button>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">Tip: hold a vertex handle and drag to reshape</div>
  <input type="file" id="img-input" accept="image/*" style="display:none">


<script>
const SVGNS = "http://www.w3.org/2000/svg";
const GRID = 40;          // pixels per unit
const W = 880, H = 640;   // both centre lines (440, 320) land on grid lines

const state = {
  shapes: [],
  selectedId: null,
  selectedIds: [],
  marquee: null,
  tool: "select",
  snap: true,
  showGrid: true,
  showAxes: false,
  nextId: 1,
  nextGid: 1,
  zoom: 1,
};

const board = document.getElementById("board");
board.setAttribute("viewBox", `0 0 ${W} ${H}`);
let mathReady = false;
const mathCache = new Map();
let mkOpen = true, mkCat = "Basic", mkTarget = "mq";
const MQ = window.MathQuill ? MathQuill.getInterface(2) : null;
let activeMQ = null;
let exporting = false;

/* clickable maths palette: [display glyph, LaTeX snippet]; ‸ marks where the caret should land */
const SYMBOLS = {
  "Basic": [
    ["a/b","\\frac{‸}{}"], ["xⁿ","^{‸}"], ["xₙ","_{‸}"], ["√","\\sqrt{‸}"], ["ⁿ√","\\sqrt[‸]{}"], ["( )","\\left(‸\\right)"],
    ["|x|","ABS"], ["π","\\pi"], ["e","e"], ["θ","\\theta"], ["°","^\\circ"], ["×","\\times"],
    ["÷","\\div"], ["±","\\pm"], ["·","\\cdot"], ["!","!"], ["∞","\\infty"], ["%","\\%"],
  ],
  "Compare": [
    ["=","="], ["≠","\\neq"], ["<","<"], [">",">"], ["≤","\\le"], ["≥","\\ge"],
    ["≈","\\approx"], ["≡","\\equiv"], ["∝","\\propto"], ["→","\\to"], ["±","\\pm"], ["∓","\\mp"],
  ],
  "Functions": [
    ["sin","\\sin"], ["cos","\\cos"], ["tan","\\tan"],
    ["sin⁻¹","\\sin^{-1}"], ["cos⁻¹","\\cos^{-1}"], ["tan⁻¹","\\tan^{-1}"],
    ["ln","\\ln"], ["log","\\log"], ["logₐ","\\log_{‸}"], ["eˣ","e^{‸}"], ["10ˣ","10^{‸}"], ["|x|","ABS"],
    ["sinh","\\sinh"], ["cosh","\\cosh"], ["tanh","\\tanh"], ["√","\\sqrt{‸}"], ["ⁿ√","\\sqrt[‸]{}"], ["a/b","\\frac{‸}{}"],
  ],
  "Greek": [
    ["α","\\alpha"], ["β","\\beta"], ["γ","\\gamma"], ["δ","\\delta"], ["θ","\\theta"], ["λ","\\lambda"],
    ["μ","\\mu"], ["π","\\pi"], ["ρ","\\rho"], ["σ","\\sigma"], ["φ","\\phi"], ["ω","\\omega"],
    ["Δ","\\Delta"], ["Σ","\\Sigma"], ["Ω","\\Omega"], ["Θ","\\Theta"], ["Π","\\Pi"], ["Φ","\\Phi"],
  ],
  "Geometry": [
    ["∠","\\angle"], ["△","\\triangle"], ["∥","\\parallel"], ["⊥","\\perp"], ["≅","\\cong"], ["∼","\\sim"],
    ["°","^\\circ"], ["a⃗","\\vec{‸}"], ["AB","\\overline{‸}"], ["′","'"], ["″","''"], ["…","\\dots"],
  ],
  "Calculus": [
    ["∑","\\sum"], ["∏","\\prod"], ["∫","\\int"], ["lim","\\lim"], ["d/dx","\\frac{d}{dx}"], ["∂","\\partial"],
    ["√","\\sqrt{‸}"], ["ⁿ√","\\sqrt[‸]{}"], ["a/b","\\frac{‸}{}"], ["xⁿ","^{‸}"], ["∞","\\infty"], ["!","!"],
  ],
  "Sets": [
    ["∈","\\in"], ["∉","\\notin"], ["⊂","\\subset"], ["⊆","\\subseteq"], ["∪","\\cup"], ["∩","\\cap"],
    ["∅","\\emptyset"], ["ℝ","\\mathbb{R}"], ["ℤ","\\mathbb{Z}"], ["ℕ","\\mathbb{N}"], ["∀","\\forall"], ["∃","\\exists"],
  ],
};

/* insert a snippet into the label field at the caret; auto-wrap in $…$ when outside math */
function insertMath(raw) {
  const input = document.getElementById("f-label");
  if (!input) return;
  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;
  const val = input.value, before = val.slice(0, start), after = val.slice(end);
  const inMath = (before.split("$").length - 1) % 2 === 1;
  let token = raw, caretAt = token.indexOf("‸");
  if (caretAt >= 0) token = token.replace("‸", "");
  const insert = inMath ? token : "$" + token + "$";
  input.value = before + insert + after;
  const pos = caretAt >= 0 ? before.length + (inMath ? 0 : 1) + caretAt : before.length + insert.length;
  input.focus(); input.setSelectionRange(pos, pos);
  const s = getShape(state.selectedId);
  if (s) { s.label = input.value; render(); }
}

function renderKeyboard() {
  const root = document.getElementById("mk");
  if (!root) return;
  root.innerHTML =
    `<button class="mk-toggle" id="mk-toggle"><span>⌨ Maths Keyboard</span><span>${mkOpen?"▴":"▾"}</span></button>` +
    (mkOpen ? `<div class="mk-body">
      <div class="mk-tabs">${Object.keys(SYMBOLS).map(c=>`<button class="mk-chip${c===mkCat?" on":""}" data-cat="${c}">${c}</button>`).join("")}</div>
      <div class="mk-grid">${SYMBOLS[mkCat].map((s,i)=>`<button class="mk-key" data-i="${i}" title="${s[1].replace(/"/g,"&quot;")}">${s[0]}</button>`).join("")}</div>
    </div>` : "");
  document.getElementById("mk-toggle").onclick = () => { mkOpen = !mkOpen; renderKeyboard(); };
  root.querySelectorAll(".mk-chip").forEach(b => b.onmousedown = e => { e.preventDefault(); mkCat = b.dataset.cat; renderKeyboard(); });
  root.querySelectorAll(".mk-key").forEach(b => b.onmousedown = e => { e.preventDefault();
    const entry = SYMBOLS[mkCat][+b.dataset.i], glyph = entry[0], snip = entry[1];
    if (mkTarget === "text") insertGlyphIntoText(glyph);
    else if (MQ && activeMQ) mqInsert(snip); else insertMath(snip);
  });
}

/* ---------- tool definitions ---------- */
const TOOLS = [
  { id: "select", name: "Select", icon: '<path d="M5 3l14 7-6 2-2 6z" fill="currentColor"/>' },
  { id: "rect", name: "Rect", icon: '<rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="2"/>' },

imgInput.onchange = () => {

        const s = getShape(replaceTargetId); replaceTargetId = null;
        if (s) { s.href = href; s.ratio = nw / nh; render(); }

      const sc = Math.min(1, 320 / Math.max(nw, nh));   // scale large images down to fit
      const w = Math.round(nw * sc), h = Math.round(nh * sc);
      const s = { id: state.nextId++, type: "image", x: Math.round(W/2 - w/2), y: Math.round(H/2 - h/2), w, h, href,
                  ratio: w / h, lockAspect: true, stroke: "#1f2330", strokeWidth: 0 };
      state.shapes.push(s);

    im.src = href;

};

/* build a uniform tree of the given branch counts, preserving any existing labels */
function genTree(counts, level = 0, existing = null) {
  const c = counts[level] || 0, arr = [];
  for (let i = 0; i < c; i++) {
    const ex = existing && existing[i] ? existing[i] : null;
    const node = { p: ex ? ex.p : "", name: ex ? ex.name : "" };
    node.children = (level + 1 < counts.length) ? genTree(counts, level + 1, ex ? ex.children : null) : [];
    arr.push(node);
  }
  return arr;
}

/* ---------- shape factory ---------- */
function regPoly(cx, cy, R, n, rot) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = rot + i * 2 * Math.PI / n;
    pts.push({ x: Math.round(cx + R*Math.cos(a)), y: Math.round(cy + R*Math.sin(a)) });
  }
  return pts;
}
function makeShape(type, x, y) {

  if (type === "righttri")  return { ...base, type: "poly", rightAngle: true, pts: [{x:x-70, y:y+60},{x:x-70, y:y-60},{x:x+90, y:y+60}] };
  if (type === "circle")    return { ...base, cx: x, cy: y, r: 80, showRadius: false, showCentre: false, parts: [] };
  if (type === "ellipse")   return { ...base, type:"ellipse", cx: x, cy: y, rx: 90, ry: 60 };
  if (type === "square")    return { ...base, type:"rect", x: x-70, y: y-70, w: 140, h: 140 };
  if (type === "parallelogram") return { ...base, type:"poly", pts: [{x:x-60,y:y+50},{x:x+40,y:y+50},{x:x+80,y:y-50},{x:x-20,y:y-50}] };
  if (type === "trapezium") return { ...base, type:"poly", pts: [{x:x-40,y:y-50},{x:x+40,y:y-50},{x:x+80,y:y+50},{x:x-80,y:y+50}] };
  if (type === "rhombus")   return { ...base, type:"poly", pts: [{x:x,y:y-70},{x:x+60,y:y},{x:x,y:y+70},{x:x-60,y:y}] };
  if (type === "kite")      return { ...base, type:"poly", pts: [{x:x,y:y-75},{x:x+50,y:y-15},{x:x,y:y+80},{x:x-50,y:y-15}] };
  if (type === "pentagon")  return { ...base, type:"poly", pts: regPoly(x, y, 80, 5, -Math.PI/2) };
  if (type === "hexagon")   return { ...base, type:"poly", pts: regPoly(x, y, 80, 6, -Math.PI/2) };
  if (type === "octagon")   return { ...base, type:"poly", pts: regPoly(x, y, 80, 8, -Math.PI/2 + Math.PI/8) };
  if (type === "graph")     return { ...base, type:"graph", x:x-180, y:y-150, w:360, h:300,
                                     xmin:-5, xmax:5, ymin:-5, ymax:5, showGrid:true, showNumbers:true, showArrows:true,

                                     title:"", showValues:true, color:"#534ab7",
                                     data:[{label:"A",value:4},{label:"B",value:7},{label:"C",value:3},{label:"D",value:5}] };
  if (type === "compass")   return { ...base, type:"compass", cx:x, cy:y, r:70, bearing:65, lineLen:70, showLabel:true, color:"#d85a30" };
  if (type === "parallel")  return { ...base, type:"parallel", x:x-110, y:y-50, w:220, h:100, angle:60, showAngles:false, showAngleLabels:false, showLineLabels:false, shownAngles:[] };

  if (type === "solid")     return { ...base, type:"solid", solidType:"cuboid", x:x-80, y:y-70, w:160, h:120, depth:46, showRadius:false, showDiameter:false, dimLabel:"" };
  if (type === "numberline") return { ...base, type:"numberline", x:x-150, y:y, w:300, min:-5, max:5, step:1, showNumbers:true, arrows:true, marks:[] };
  if (type === "carc")      return { ...base, type:"carc", cx:x, cy:y, r:80, a1:200, a2:340 };

  if (type === "barmodel")  return { ...base, type:"barmodel", x:x-140, y:y-30, w:280, h:60, showCounts:false,
                                     parts:[{label:"",count:2,color:"#534ab7"},{label:"",count:3,color:"#1d9e75"}] };
  if (type === "clock")     return { ...base, type:"clock", cx:x, cy:y, r:70, hour:3, minute:0, second:0, showNumbers:true, showSeconds:false };

  if (type === "counter")   return { ...base, type:"counter", cx:x, cy:y, r:17, value:"1", color:"#534ab7" };

                                     sectors:[{label:"1",count:1,color:"#534ab7"},{label:"2",count:1,color:"#1d9e75"},{label:"3",count:1,color:"#d85a30"},{label:"4",count:1,color:"#185fa5"}] };
  if (type === "line")      return { ...base, type: "line", pts: [{x:x-90, y:y+40},{x:x+90, y:y-40}] };
  if (type === "point")     return { ...base, cx: x, cy: y, label: "" };

                                     fontFamily: "'Lexend',sans-serif", bold:false, italic:false, underline:false, strike:false };

  if (type === "edge")      return { ...base, type: "edge", pts: [{x:x-90, y:y},{x:x+90, y:y}], label: "", directed: false, dir: 1, weighted: false, weight: "",

  if (type === "tree")      return { ...base, type: "tree", x:x-210, y:y-140, w:420, h:280, counts:[2,2], tree: genTree([2,2]) };

/* ---------- helpers ---------- */
const snap = v => state.snap ? Math.round(v / (GRID/2)) * (GRID/2) : v;
function dist(a, b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function unitLen(px){ return Math.round((px / GRID) * 10) / 10; }
function getShape(id){ return state.shapes.find(s => s.id === id); }
const LETTERS = "ABCDEFGHIJ";

/* ---------- rendering ---------- */
function render() {
  while (board.firstChild) board.removeChild(board.firstChild);

  if (state.showGrid) drawGrid();
  if (state.showAxes) drawAxes();

  state.shapes.forEach(s => drawShape(s, s.id === state.selectedId));
  if (state.selectedIds.length > 1) {
    state.selectedIds.forEach(id => { const s = getShape(id); if (s) drawOutline(s); });
  } else if (state.selectedId != null) {
    drawHandles(getShape(state.selectedId));
  }
  if (state.marquee) drawMarquee();
  if (!exporting) scheduleSnapshot();
}

function shapeBBox(s) {
  if (s.type === "solid") return { x:s.x, y:s.y - s.depth*0.5, w:s.w + s.depth*0.5, h:s.h + s.depth*0.5 };
  if (s.type === "numberline") return { x:s.x, y:s.y-30, w:s.w, h:60 };
  if (s.type === "barmodel") return { x:s.x, y:s.y-22, w:s.w, h:s.h+34 };
  if (["rect","graph","tree","image","chart","parallel","venn","table","dice","tile"].includes(s.type)) return { x:s.x, y:s.y, w:s.w, h:s.h };
  if (["circle","node","compass","carc","clock","spinner","counter"].includes(s.type)) return { x:s.cx-s.r, y:s.cy-s.r, w:2*s.r, h:2*s.r };
  if (s.type === "ellipse") return { x:s.cx-s.rx, y:s.cy-s.ry, w:2*s.rx, h:2*s.ry };
  if (s.type === "point") return { x:s.cx-6, y:s.cy-6, w:12, h:12 };
  if (s.type === "text") { const b = s._bb; return b ? { x:b.x, y:b.y, w:b.w, h:b.h } : { x:s.x, y:s.y-12, w:80, h:24 }; }
  const pts = s.pts || [];
  if (!pts.length) return { x:0, y:0, w:0, h:0 };
  let a=Infinity, b=Infinity, c=-Infinity, d=-Infinity;
  pts.forEach(p => { a=Math.min(a,p.x); b=Math.min(b,p.y); c=Math.max(c,p.x); d=Math.max(d,p.y); });
  return { x:a, y:b, w:c-a, h:d-b };
}
function drawOutline(s) {
  const b = shapeBBox(s);
  el("rect", { x:b.x-4, y:b.y-4, width:b.w+8, height:b.h+8, fill:"rgba(83,74,183,0.08)",
               stroke:"#534ab7", "stroke-width":1, "stroke-dasharray":"4 3", "pointer-events":"none" });
}
function drawMarquee() {
  const m = state.marquee;
  el("rect", { x:Math.min(m.x0,m.x1), y:Math.min(m.y0,m.y1), width:Math.abs(m.x1-m.x0), height:Math.abs(m.y1-m.y0),
               fill:"rgba(83,74,183,0.08)", stroke:"#534ab7", "stroke-width":1, "stroke-dasharray":"4 3", "pointer-events":"none" });
}
const rectsIntersect = (a, b) => a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/* key points of a shape used for snapping (its corners / vertices / centre + cardinal edges) */
function getShapePoints(s) {
  if (["rect","graph","tree","image","chart","parallel","venn","solid"].includes(s.type))
    return [{x:s.x,y:s.y},{x:s.x+s.w,y:s.y},{x:s.x+s.w,y:s.y+s.h},{x:s.x,y:s.y+s.h}];
  if (s.type === "compass") { const b = s.bearing*Math.PI/180, len = s.lineLen||s.r; return [{x:s.cx,y:s.cy},{x:s.cx+Math.sin(b)*len,y:s.cy-Math.cos(b)*len}]; }
  if (s.type === "circle" || s.type === "node" || s.type === "compass")
    return [{x:s.cx,y:s.cy},{x:s.cx+s.r,y:s.cy},{x:s.cx-s.r,y:s.cy},{x:s.cx,y:s.cy+s.r},{x:s.cx,y:s.cy-s.r}];
  if (s.type === "ellipse")
    return [{x:s.cx,y:s.cy},{x:s.cx+s.rx,y:s.cy},{x:s.cx-s.rx,y:s.cy},{x:s.cx,y:s.cy+s.ry},{x:s.cx,y:s.cy-s.ry}];

  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, rx:Math.min(s.w,s.h)*0.12, fill:"#fff", stroke:s.stroke, "stroke-width":s.strokeWidth, "data-id":s.id, "pointer-events":"all" });

  const pat = { 1:[[c,c]], 2:[[a,a],[b,b]], 3:[[a,a],[c,c],[b,b]], 4:[[a,a],[b,a],[a,b],[b,b]],

  pat.forEach(([fx,fy]) => el("circle", { cx:s.x+fx*s.w, cy:s.y+fy*s.h, r:pr, fill:s.stroke }, g));
}

/* ---------- spinner ---------- */
function drawSpinner(s) {
  el("circle", { cx:s.cx, cy:s.cy, r:s.r, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const total = (s.sectors||[]).reduce((t,x) => t + (+x.count||0), 0) || 1;
  let ang = -90;
  (s.sectors||[]).forEach(sec => {
    const sweep = (+sec.count||0)/total*360, a2 = ang + sweep;
    const p1 = ptAt(s.cx,s.cy,s.r,ang), p2 = ptAt(s.cx,s.cy,s.r,a2), large = sweep > 180 ? 1 : 0;
    el("path", { d:`M ${s.cx} ${s.cy} L ${p1.x} ${p1.y} A ${s.r} ${s.r} 0 ${large} 1 ${p2.x} ${p2.y} Z`, fill:sec.color, "fill-opacity":0.55, stroke:s.stroke, "stroke-width":1 }, g);
    if (sec.label) { const lp = ptAt(s.cx,s.cy,s.r*0.62, ang+sweep/2); ctext(g, lp.x, lp.y, sec.label, "middle", 13, "#1f2330", "500"); }
    ang = a2;
  });
  el("circle", { cx:s.cx, cy:s.cy, r:s.r, fill:"none", stroke:s.stroke, "stroke-width":s.strokeWidth }, g);
  const pa = s.pointer*Math.PI/180, tip = { x:s.cx+Math.sin(pa)*s.r*0.9, y:s.cy-Math.cos(pa)*s.r*0.9 };
  el("line", { x1:s.cx, y1:s.cy, x2:tip.x, y2:tip.y, stroke:"#1f2330", "stroke-width":2.5, "stroke-linecap":"round" }, g);
  arrowHead({ x:s.cx, y:s.cy }, tip, "#1f2330");
  el("circle", { cx:s.cx, cy:s.cy, r:3.5, fill:"#1f2330" }, g);
}

/* ---------- algebra tiles & place-value counters ---------- */
function drawTile(s) {
  const kc = { x2:"#185fa5", x:"#1d9e75", unit:"#ba7517" }[s.kind] || "#185fa5";
  const col = s.sign > 0 ? kc : "#d85a30";
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, rx:3, fill:col, "fill-opacity":0.28, stroke:col, "stroke-width":1.5, "data-id":s.id, "pointer-events":"all" });
  const term = { x2:"x²", x:"x", unit:"1" }[s.kind] || "x²";
  buildLabel(s.x + s.w/2, s.y + s.h/2, (s.sign < 0 ? "−" : "") + term, "#1f2330", "middle", s.kind === "unit" ? 12 : 14, false, false);
}
function drawCounter(s) {
  el("circle", { cx:s.cx, cy:s.cy, r:s.r, fill:s.color, "fill-opacity":0.28, stroke:s.color, "stroke-width":1.5, "data-id":s.id, "pointer-events":"all" });

/* ---------- table (two-way / frequency) ---------- */
function drawTable(s) {
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const cw = s.w / s.cols, rh = s.h / s.rows;
  if (s.headerRow) el("rect", { x:s.x, y:s.y, width:s.w, height:rh, fill:"#f1f0f8" }, g);
  if (s.headerCol) el("rect", { x:s.x, y:s.y, width:cw, height:s.h, fill:"#f1f0f8" }, g);
  for (let i = 0; i <= s.rows; i++) el("line", { x1:s.x, y1:s.y+i*rh, x2:s.x+s.w, y2:s.y+i*rh, stroke:s.stroke, "stroke-width":1 }, g);
  for (let j = 0; j <= s.cols; j++) el("line", { x1:s.x+j*cw, y1:s.y, x2:s.x+j*cw, y2:s.y+s.h, stroke:s.stroke, "stroke-width":1 }, g);
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"none", stroke:s.stroke, "stroke-width":1.5 }, g);
  for (let r = 0; r < s.rows; r++) for (let c = 0; c < s.cols; c++) {
    const txt = (s.cells[r] && s.cells[r][c]) || "";
    if (txt) { const head = (r === 0 && s.headerRow) || (c === 0 && s.headerCol);
      ctext(g, s.x + c*cw + cw/2, s.y + r*rh + rh/2, txt, "middle", 13, s.stroke, head ? "500" : null); }

}

/* ---------- bar / ratio model ---------- */
function drawBarModel(s) {
  el("rect", { x:s.x, y:s.y-22, width:s.w, height:s.h+30, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const total = (s.parts || []).reduce((a, p) => a + (+p.count || 0), 0) || 1;
  const uw = s.w / total;
  let x = s.x;
  (s.parts || []).forEach(p => {
    const n = Math.max(0, Math.round(+p.count || 0)), gw = uw * n;
    for (let k = 0; k < n; k++) {
      el("rect", { x:x + k*uw, y:s.y, width:uw, height:s.h, fill:p.color, "fill-opacity":0.3, stroke:s.stroke, "stroke-width":1 }, g);
    }
    if (s.showCounts && n) ctext(g, x + gw/2, s.y + s.h/2, String(n), "middle", 13, s.stroke, "500");
    if (p.label) ctext(g, x + gw/2, s.y + s.h + 13, p.label, "middle", 12, s.stroke);
    x += gw;
  });
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"none", stroke:s.stroke, "stroke-width":1.5 }, g);
}

/* ---------- venn diagrams ---------- */
const VENN_SHADES_2 = {
  "none": null,
  "A": { in:[0] }, "B": { in:[1] },
  "A ∩ B": { in:[0,1] }, "A ∪ B": { union:[0,1] },
  "A only": { in:[0], out:[1] }, "B only": { in:[1], out:[0] },
  "Neither (A∪B)'": { in:[], out:[0,1] },
};
const VENN_SHADES_3 = {
  "none": null,
  "A ∩ B ∩ C": { in:[0,1,2] }, "A ∪ B ∪ C": { union:[0,1,2] },
  "A only": { in:[0], out:[1,2] }, "A ∩ B": { in:[0,1] },
  "(A ∩ B) only": { in:[0,1], out:[2] }, "Neither": { in:[], out:[0,1,2] },
};
function vennCircles(s) {
  const x = s.x, y = s.y, w = s.w, h = s.h;
  if (s.sets === 3) {
    const r = Math.min(w, h) * 0.27, cx = x + w/2, cyT = y + h*0.42, cyB = y + h*0.64;
    return [
      { cx: cx - r*0.62, cy: cyT, r, lx: cx - r*1.25, ly: cyT - r*0.95 },
      { cx: cx + r*0.62, cy: cyT, r, lx: cx + r*1.25, ly: cyT - r*0.95 },
      { cx, cy: cyB, r, lx: cx, ly: cyB + r*1.1 },
    ];
  }
  const r = Math.min(w*0.32, h*0.42), cy = y + h/2, cxL = x + w*0.40, cxR = x + w*0.60;
  return [ { cx: cxL, cy, r, lx: cxL - r*0.95, ly: cy - r*1.0 }, { cx: cxR, cy, r, lx: cxR + r*0.95, ly: cy - r*1.0 } ];
}
let vennUid = 0;
function vennShade(s, defs, g, spec, circles, col) {
  if (spec.union) { spec.union.forEach(i => el("circle", { cx:circles[i].cx, cy:circles[i].cy, r:circles[i].r, fill:col }, g)); return; }
  const uid = "v" + s.id + "_" + (vennUid++);
  let parent = g;
  (spec.in || []).forEach((ci, k) => {
    const id = uid + "c" + k, cp = el("clipPath", { id }, defs);
    el("circle", { cx:circles[ci].cx, cy:circles[ci].cy, r:circles[ci].r }, cp);
    parent = el("g", { "clip-path": `url(#${id})` }, parent);
  });
  const rect = el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:col }, parent);
  if (spec.out && spec.out.length) {
    const mid = uid + "m", mask = el("mask", { id:mid, maskUnits:"userSpaceOnUse", x:s.x, y:s.y, width:s.w, height:s.h }, defs);
    el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"#fff" }, mask);
    spec.out.forEach(ci => el("circle", { cx:circles[ci].cx, cy:circles[ci].cy, r:circles[ci].r, fill:"#000" }, mask));
    rect.setAttribute("mask", `url(#${mid})`);

}
function drawVenn(s) {
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const defs = el("defs", {}, g);
  const circles = vennCircles(s);
  const specs = s.sets === 3 ? VENN_SHADES_3 : VENN_SHADES_2;
  const spec = specs[s.shade];
  if (spec) vennShade(s, defs, g, spec, circles, s.shadeColor || "#cfcaf2");
  if (s.universal) {
    el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"none", stroke:s.stroke, "stroke-width":1 }, g);
    buildLabel(s.x + 12, s.y + 13, "ξ", s.stroke, "middle", 14, false, true);
    if (s.outside) buildLabel(s.x + s.w - 12, s.y + s.h - 12, s.outside, s.stroke, "end", 14, false, true);
  }
  circles.forEach(c => el("circle", { cx:c.cx, cy:c.cy, r:c.r, fill:"none", stroke:s.stroke, "stroke-width":s.strokeWidth }, g));
  circles.forEach((c, i) => buildLabel(c.lx, c.ly, s.labels[i] || "", s.stroke, "middle", 15, false, true));

/* ---------- 3D solids ---------- */
function ellArc(g, cx, cy, rx, ry, d1, d2, col, sw, dash) {
  const p1 = { x:cx + rx*Math.cos(d1*Math.PI/180), y:cy + ry*Math.sin(d1*Math.PI/180) };
  const p2 = { x:cx + rx*Math.cos(d2*Math.PI/180), y:cy + ry*Math.sin(d2*Math.PI/180) };
  const a = { d:`M ${p1.x} ${p1.y} A ${rx} ${ry} 0 ${(d2-d1)>180?1:0} 1 ${p2.x} ${p2.y}`, fill:"none", stroke:col, "stroke-width":sw };
  if (dash) a["stroke-dasharray"] = "5 4";
  el("path", a, g);
}
function drawSolid(s) {
  const bb = shapeBBox(s);
  el("rect", { x:bb.x, y:bb.y, width:bb.w, height:bb.h, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const sw = s.strokeWidth, col = s.stroke;
  const ln = (a, b, dash) => { const o = { x1:a.x, y1:a.y, x2:b.x, y2:b.y, stroke:col, "stroke-width":sw, "stroke-linecap":"round" }; if (dash) o["stroke-dasharray"] = "5 4"; el("line", o, g); };
  const x = s.x, y = s.y, w = s.w, h = s.h, d = s.depth, dx = d*0.5, dy = -d*0.5, t = s.solidType;
  let base = null;   // {cx, cy, hr} of the circular face for radius/diameter marking
  if (t === "cuboid" || t === "cube") {
    const fTL={x,y}, fTR={x:x+w,y}, fBR={x:x+w,y:y+h}, fBL={x,y:y+h};
    const bTL={x:x+dx,y:y+dy}, bTR={x:x+w+dx,y:y+dy}, bBR={x:x+w+dx,y:y+h+dy}, bBL={x:x+dx,y:y+h+dy};
    [[fTL,fTR],[fTR,fBR],[fBR,fBL],[fBL,fTL],[fTL,bTL],[fTR,bTR],[fBR,bBR],[bTL,bTR],[bTR,bBR]].forEach(e => ln(e[0],e[1]));
    [[bBL,bTL],[bBL,bBR],[bBL,fBL]].forEach(e => ln(e[0],e[1],true));
  } else if (t === "cylinder") {
    const cx=x+w/2, rx=w/2, ey=Math.min(h/2-2, w*0.16), topY=y+ey, botY=y+h-ey;
    ln({x:cx-rx,y:topY},{x:cx-rx,y:botY}); ln({x:cx+rx,y:topY},{x:cx+rx,y:botY});
    el("ellipse",{cx,cy:topY,rx,ry:ey,fill:"none",stroke:col,"stroke-width":sw},g);
    ellArc(g,cx,botY,rx,ey,0,180,col,sw,false); ellArc(g,cx,botY,rx,ey,180,360,col,sw,true);
    base = { cx, cy:topY, hr:rx };
  } else if (t === "cone") {
    const cx=x+w/2, rx=w/2, ey=Math.min(h*0.16, w*0.16), botY=y+h-ey, apex={x:cx,y};
    ln(apex,{x:cx-rx,y:botY}); ln(apex,{x:cx+rx,y:botY});
    ellArc(g,cx,botY,rx,ey,0,180,col,sw,false); ellArc(g,cx,botY,rx,ey,180,360,col,sw,true);
    base = { cx, cy:botY, hr:rx };
  } else if (t === "sphere") {
    const cx=x+w/2, cy=y+h/2, r=Math.min(w,h)/2;
    el("circle",{cx,cy,r,fill:"none",stroke:col,"stroke-width":sw},g);
    ellArc(g,cx,cy,r,r*0.32,0,180,col,1,false); ellArc(g,cx,cy,r,r*0.32,180,360,col,1,true);
    base = { cx, cy, hr:r };
  } else if (t === "pyramid") {
    const fBL={x,y:y+h}, fBR={x:x+w,y:y+h}, bBL={x:x+dx,y:y+h+dy}, bBR={x:x+w+dx,y:y+h+dy}, apex={x:x+w/2+dx/2,y};
    [[fBL,fBR],[fBR,bBR],[apex,fBL],[apex,fBR],[apex,bBR]].forEach(e => ln(e[0],e[1]));
    [[bBL,fBL],[bBL,bBR],[apex,bBL]].forEach(e => ln(e[0],e[1],true));
  } else if (t === "prism") {
    const fA={x:x+w/2,y}, fB={x,y:y+h}, fC={x:x+w,y:y+h};
    const bA={x:x+w/2+dx,y:y+dy}, bB={x:x+dx,y:y+h+dy}, bC={x:x+w+dx,y:y+h+dy};
    [[fA,fB],[fB,fC],[fC,fA]].forEach(e => ln(e[0],e[1]));
    ln(fA,bA); ln(fC,bC); ln(bA,bC);
    [[fB,bB],[bA,bB],[bB,bC]].forEach(e => ln(e[0],e[1],true));
  }
  // radius / diameter on the circular face (cylinder, cone, sphere)
  if (base && (s.showRadius || s.showDiameter)) {
    el("circle", { cx:base.cx, cy:base.cy, r:2.5, fill:col }, g);
    if (s.showDiameter) {
      ln({ x:base.cx - base.hr, y:base.cy }, { x:base.cx + base.hr, y:base.cy });
      if (s.dimLabel) buildLabel(base.cx, base.cy - 8, s.dimLabel, col, "middle", 13, true, true);
    } else if (s.showRadius) {
      ln({ x:base.cx, y:base.cy }, { x:base.cx + base.hr, y:base.cy });
      if (s.dimLabel) buildLabel(base.cx + base.hr/2, base.cy - 8, s.dimLabel, col, "middle", 13, true, true);
    }
  }
}

function drawTree(s) {
  if (!s.counts) { s.counts = [2, 2]; s.tree = genTree(s.counts); } // migrate older trees
  el("rect", { x:s.x, y:s.y, width:s.w, height:s.h, fill:"transparent", "data-id":s.id, "pointer-events":"all" });
  const g = el("g", { "pointer-events":"none" });
  const line = (x1,y1,x2,y2) => el("line", { x1, y1, x2, y2, stroke:s.stroke, "stroke-width":s.strokeWidth, "stroke-linecap":"round" }, g);
  const dot = (x,y) => el("circle", { cx:x, cy:y, r:3, fill:s.stroke }, g);
  const branchLbl = (a, b, txt) => { if (!txt) return; const m = mid(a, b), o = perp(a, b, 12); buildLabel(m.x+o.x, m.y+o.y, txt, "#534ab7", "middle", 13, true, true); };
  // leaves label on the right; intermediate (incl. first-step) outcomes on the left of the vertex
  const nodeLbl = (x, y, txt, leaf) => { if (!txt) return;
    if (leaf) buildLabel(x+12, y, txt, s.stroke, "start", 14, true, false);
    else buildLabel(x-12, y, txt, s.stroke, "end", 14, true, false); };

  const depth = s.counts.length;
  const totalLeaves = s.counts.reduce((a, c) => a * c, 1) || 1;
  const colX = d => s.x + 14 + (s.w - 44) * (depth ? d / depth : 0);

  let slot = 0;
  const place = (node, d) => {
    let y;
    if (!node.children || node.children.length === 0) { y = s.y + s.h * (slot + 0.5) / totalLeaves; slot++; }
    else { const ys = node.children.map(c => place(c, d + 1)); y = (Math.min(...ys) + Math.max(...ys)) / 2; }
    node._x = colX(d); node._y = y; return y;
  };
  s.tree.forEach(n => place(n, 1));
  const ys = s.tree.map(n => n._y);
  const rootX = colX(0), rootY = ys.length ? (Math.min(...ys) + Math.max(...ys)) / 2 : s.y + s.h/2;

  dot(rootX, rootY);
  const drawNode = (node, px, py) => {
    line(px, py, node._x, node._y);
    branchLbl({ x:px, y:py }, { x:node._x, y:node._y }, node.p);
    dot(node._x, node._y);
    const leaf = !node.children || node.children.length === 0;
    nodeLbl(node._x, node._y, node.name, leaf);
    (node.children || []).forEach(c => drawNode(c, node._x, node._y));
  };
  s.tree.forEach(n => drawNode(n, rootX, rootY));
}

function centroid(s) {
  if (s.type === "circle" || s.type === "ellipse") return { x: s.cx, y: s.cy };
  if (s.type === "line") return { x:(s.pts[0].x+s.pts[1].x)/2, y:(s.pts[0].y+s.pts[1].y)/2 - 10 };
  const pts = polyPoints(s);
  return { x: pts.reduce((a,p)=>a+p.x,0)/pts.length, y: pts.reduce((a,p)=>a+p.y,0)/pts.length };
}

function label(x, y, text, color, anchor) {
  return buildLabel(x, y, text, color, anchor || "middle", 15);
}

/* escape plain-text segments so they are safe inside \text{} */
function escTex(s) {
  return s.replace(/\\/g, "\\textbackslash{}")
          .replace(/[{}$&#%_]/g, m => "\\" + m)
          .replace(/\^/g, "\\^{}").replace(/~/g, "\\~{}");
}
/* turn "side $x^2$ here" into a single TeX string mixing text + math */
function buildTeX(s) {
  const parts = String(s).split("$");
  let tex = "";
  parts.forEach((p, i) => {
    if (i % 2 === 0) { if (p) tex += "\\text{" + escTex(p) + "}"; }
    else { tex += "{" + p + "}"; }
  });
  return tex || "\\text{}";
}
function getMath(tex) {
  if (mathCache.has(tex)) return mathCache.get(tex);
  let r = null;
  try {
    const c = MathJax.tex2svg(tex);
    const svg = c.querySelector("svg");
    r = { svg, exW: parseFloat(svg.getAttribute("width")) || 1, exH: parseFloat(svg.getAttribute("height")) || 1 };
  } catch (e) { r = null; }
  mathCache.set(tex, r);
  return r;
}

/* renders a label as non-interactive graphics; returns its bbox.
   isMath=true → text is raw LaTeX (from the maths field). Otherwise $…$ inside text is math. */
function buildLabel(x, y, text, color, anchor, size, halo = true, isMath = false) {
  let tex = null;
  if (mathReady && text) {
    if (isMath) tex = text;
    else if (text.includes("$")) tex = buildTeX(text);
  }
  if (tex) {
    const m = getMath(tex);
    if (m) {
      const k = size * 0.55;
      const pw = m.exW * k, ph = m.exH * k;
      let lx = anchor === "start" ? x : x - pw/2;
      const ly = y - ph/2;
      if (halo) el("rect", { x:lx-2, y:ly-1, width:pw+4, height:ph+2, rx:3, fill:"#fff", opacity:0.82, "pointer-events":"none" });
      const svg = m.svg.cloneNode(true);
      svg.setAttribute("x", lx); svg.setAttribute("y", ly);
      svg.setAttribute("width", pw); svg.setAttribute("height", ph);
      svg.removeAttribute("style");
      svg.style.color = color || "#1f2330";
      svg.style.pointerEvents = "none";
      board.appendChild(svg);
      return { x:lx, y:ly, w:pw, h:ph };
    }
  }
  const attrs = { x, y, fill: color || "#1f2330", "font-size": size,
                  "font-family":"'Lexend','Segoe UI',sans-serif", "text-anchor": anchor || "middle",
                  "dominant-baseline":"middle", "pointer-events":"none" };
  if (halo) { attrs["paint-order"] = "stroke"; attrs.stroke = "#fff"; attrs["stroke-width"] = 3; attrs["stroke-linejoin"] = "round"; }
  const t = el("text", attrs);
  t.textContent = text;
  let bb; try { bb = t.getBBox(); } catch (e) { bb = { x:x-10, y:y-8, width:20, height:16 }; }
  return { x:bb.x, y:bb.y, w:bb.width, h:bb.height };
}

function drawSideLabels(pts, closed) {
  const n = pts.length;
  const lim = closed ? n : n - 1;
  for (let i = 0; i < lim; i++) {

/* ---------- coordinate graph ---------- */
const GFUNCS = { sin:"Math.sin", cos:"Math.cos", tan:"Math.tan", asin:"Math.asin", acos:"Math.acos", atan:"Math.atan",

  let sr = /\\sqrt\{([^{}]*)\}/;                       while (sr.test(s)) s = s.replace(sr, "sqrt($1)");
  s = s.replace(/\\(sin|cos|tan|sinh|cosh|tanh|sec|csc|cot|ln|log|exp|abs)/g, "$1");

        pY = y; pX = x;
      }
      asy.forEach(ax => el("line", { x1:mapX(ax), y1:s.y, x2:mapX(ax), y2:s.y+s.h, stroke:f.color||"#888",
        "stroke-width":1, "stroke-dasharray":"5 4", "clip-path":`url(#${cid})`, "pointer-events":"none" }, g));
    });
  }

  // intersection points — click a marker to pin its coordinates (click again to remove)
  if ((s.functions || []).length >= 2) {
    s.shownPts = s.shownPts || [];
    graphIntersections(s).forEach(p => {
      const key = round3(p.x) + "_" + round3(p.y);
      const shown = s.shownPts.includes(key);
      if (exporting && !shown) return;
      const px = mapX(p.x), py = mapY(p.y);
      if (shown) buildLabel(px + 9, py - 11, `(${fmtc(p.x)}, ${fmtc(p.y)})`, "#1f2330", "start", 13, true, false);
      if (!exporting || shown)
        el("circle", { cx:px, cy:py, r:5, fill: shown ? "#534ab7" : "#ffffff", stroke:"#534ab7",
                       "stroke-width":1.5, "data-ipt": s.id, "data-key": key, style:"cursor:pointer", "pointer-events":"all" });
    });
  }
}

/* ---------- tree diagram panel ---------- */
const clampInt = (v, lo, hi) => Math.max(lo, Math.min(hi, Math.round(+v) || lo));

function buildTreePanel(s) {
  if (!s.counts) { s.counts = [2, 2]; s.tree = genTree(s.counts); }
  panel.innerHTML = `<h3>Tree diagram</h3>
    <div class="field"><label>Number of steps</label><input type="number" id="t-steps" min="1" max="4" value="${s.counts.length}"></div>
    <div id="t-counts"></div>
    <div class="field"><label>Line colour & thickness</label><div class="row">
      <input type="color" id="t-stroke" value="${s.stroke}">
      <input type="range" id="t-sw" min="1" max="12" step="0.5" value="${s.strokeWidth}">
      <input type="number" id="t-swnum" min="0.5" max="30" step="0.5" value="${s.strokeWidth}" style="width:56px"></div></div>
    <div class="field"><label>Labels</label><div id="t-fields"></div>
      <div class="hinttext">Branch = probability (type <code>1/2</code> for a fraction), outcome = result name</div></div>
    <button class="danger" id="t-del">Delete tree</button>`;
  renderCounts(s);
  renderTreeFields(s);
  document.getElementById("t-steps").onchange = e => {
    const n = clampInt(e.target.value, 1, 4);
    while (s.counts.length < n) s.counts.push(2);
    while (s.counts.length > n) s.counts.pop();
    s.tree = genTree(s.counts, 0, s.tree);
    buildTreePanel(s); render();
  };
  document.getElementById("t-stroke").oninput = e => { s.stroke = e.target.value; render(); };
  const tSetSW = v => { s.strokeWidth = +v; const r = document.getElementById("t-sw"), n = document.getElementById("t-swnum"); if (r) r.value = Math.min(12, +v); if (n) n.value = +v; render(); };
  document.getElementById("t-sw").oninput = e => tSetSW(e.target.value);
  document.getElementById("t-swnum").oninput = e => tSetSW(e.target.value);
  document.getElementById("t-del").onclick = () => { state.shapes = state.shapes.filter(x=>x.id!==s.id); state.selectedId=null; state.selectedIds=[]; render(); buildPanel(); };
}

function renderCounts(s) {
  const box = document.getElementById("t-counts"); if (!box) return;
  box.innerHTML = s.counts.map((c, i) => `<div class="field"><label>Branches at step ${i+1}</label><input type="number" id="tc-${i}" min="1" max="5" value="${c}"></div>`).join("");
  s.counts.forEach((c, i) => {
    const e = document.getElementById(`tc-${i}`);
    e.onchange = () => { s.counts[i] = clampInt(e.target.value, 1, 5); s.tree = genTree(s.counts, 0, s.tree); renderTreeFields(s); render(); };
  });
}

function renderTreeFields(s) {
  const box = document.getElementById("t-fields"); if (!box) return;
  const nodeHtml = (node, id, depth) => `
    <div style="margin-left:${depth*8}px;border-left:2px solid var(--border);padding-left:6px;margin:4px 0">
      <div style="display:flex;gap:6px;align-items:flex-start">
        ${MQ ? `<span class="mqfield" id="tp-${id}" style="width:66px;flex:none;min-height:30px;font-size:14px"></span>`
             : `<input type="text" id="tp-${id}" value="${esc(node.p)}" placeholder="prob" style="width:66px">`}
        <input type="text" id="tn-${id}" value="${esc(node.name)}" placeholder="outcome" style="flex:1;min-width:0">
      </div>
      ${(node.children||[]).map((c, j) => nodeHtml(c, id+"-"+j, depth+1)).join("")}
    </div>`;
  box.innerHTML = s.tree.map((n, i) => nodeHtml(n, String(i), 0)).join("");
  const wire = (nodes, prefix) => {
    nodes.forEach((node, i) => {
      const id = prefix === "" ? String(i) : prefix + "-" + i;
      const nameInp = document.getElementById("tn-" + id);
      if (nameInp) nameInp.oninput = () => { node.name = nameInp.value; render(); };
      if (MQ) {
        const span = document.getElementById("tp-" + id);
        if (span) { const f = MQ.MathField(span, { spaceBehavesLikeTab:false, handlers:{ edit: () => { node.p = f.latex(); render(); } } }); f.latex(node.p || ""); span.addEventListener("focusin", () => { activeMQ = f; }); }
      } else {
        const x = document.getElementById("tp-" + id);
        if (x) x.oninput = () => { node.p = x.value; render(); };
      }
      wire(node.children || [], id);
    });
  };
  wire(s.tree, "");
}

/* ---------- pointer interaction ---------- */
let drag = null;
function svgPoint(evt) {
  const r = board.getBoundingClientRect();
  return { x: (evt.clientX - r.left) * (W / r.width), y: (evt.clientY - r.top) * (H / r.height) };
}

board.addEventListener("pointerdown", (e) => {
  const p = svgPoint(e);

  if (state.tool !== "select") {
    const s = makeShape(state.tool, snap(p.x), snap(p.y));
    state.shapes.push(s);
    state.selectedId = s.id; state.selectedIds = [s.id];
    setTool("select");
    render(); buildPanel();
    return;
  }

  const target = e.target;
  const ipt = target.getAttribute && target.getAttribute("data-ipt");
  if (ipt) {
    const sh = getShape(+ipt), key = target.getAttribute("data-key");
    if (sh) { sh.shownPts = sh.shownPts || []; const idx = sh.shownPts.indexOf(key);
      if (idx >= 0) sh.shownPts.splice(idx, 1); else sh.shownPts.push(key); render(); }
    return;
  }
  const pkey = target.getAttribute && target.getAttribute("data-pkey");
  if (pkey) {
    const sh = getShape(+target.getAttribute("data-pid"));
    if (sh) { sh.shownAngles = sh.shownAngles || []; const idx = sh.shownAngles.indexOf(pkey);
      if (idx >= 0) sh.shownAngles.splice(idx, 1); else sh.shownAngles.push(pkey); render(); }
    return;
  }
  const flip = target.getAttribute && target.getAttribute("data-flip");
  if (flip) {
    const sh = getShape(+flip);
    if (sh) { sh.dir = (sh.dir || 1) * -1; render(); }
    return;
  }
  const handle = target.getAttribute && target.getAttribute("data-handle");
  if (handle) {
    drag = { mode: handle, idx: +target.getAttribute("data-idx"), start: p, orig: clone(getShape(state.selectedId)) };
    board.setPointerCapture(e.pointerId);
    return;
  }

  const idAttr = target.getAttribute && target.getAttribute("data-id");
  if (idAttr) {
    const id = +idAttr, sh = getShape(id);
    if (sh && sh.gid != null) {
      // clicking any grouped shape selects the whole group
      state.selectedIds = state.shapes.filter(x => x.gid === sh.gid).map(x => x.id);
      state.selectedId = state.selectedIds.length === 1 ? id : null;
    } else if (state.selectedIds.includes(id) && state.selectedIds.length > 1) {
      // keep the current marquee selection so it moves together
    } else {
      state.selectedId = id; state.selectedIds = [id];
    }
    drag = { mode: "move", start: p, origs: state.selectedIds.map(i => ({ id: i, o: clone(getShape(i)) })) };
    board.setPointerCapture(e.pointerId);
    render(); buildPanel();
    return;
  }

  // clicked empty space → start a marquee selection
  state.selectedId = null; state.selectedIds = [];
  state.marquee = { x0:p.x, y0:p.y, x1:p.x, y1:p.y };
  drag = { mode: "marquee", start: p };
  board.setPointerCapture(e.pointerId);
  render(); buildPanel();
});

board.addEventListener("pointermove", (e) => {
  if (!drag) return;
  const p = svgPoint(e);

  if (drag.mode === "marquee") {
    state.marquee.x1 = p.x; state.marquee.y1 = p.y; render(); return;
  }

  const dx = p.x - drag.start.x, dy = p.y - drag.start.y;

  if (drag.mode === "move") {
    let mdx = snap(dx), mdy = snap(dy);
    const movingIds = drag.origs.map(o => o.id);
    let best = null, bd = 14;
    drag.origs.forEach(({ o }) => {
      getShapePoints(o).forEach(pp => {
        const cp = { x: pp.x + mdx, y: pp.y + mdy };
        const t = snapTarget(cp, movingIds, 14);
        if (t) { const cdx = t.x - cp.x, cdy = t.y - cp.y, dd = Math.hypot(cdx, cdy); if (dd < bd) { bd = dd; best = { cdx, cdy }; } }
      });
    });
    if (best) { mdx += best.cdx; mdy += best.cdy; }
    drag.origs.forEach(({ id, o }) => { const sh = getShape(id); if (sh) translate(sh, o, mdx, mdy); });
    render(); return;
  }

  const s = getShape(state.selectedId);
  if (!s) return;
  const o = drag.orig;
  if (drag.mode === "vertex") {
    s.pts[drag.idx] = snapTarget(p, s.id) || { x: snap(p.x), y: snap(p.y) };
  } else if (drag.mode === "corner") {
    resizeRect(s, o, drag.idx, snap(p.x), snap(p.y));
    if (s.type === "image" && s.lockAspect && s.ratio) {
      const newH = s.w / s.ratio;
      if (drag.idx === 0 || drag.idx === 1) s.y = (o.y + o.h) - newH; else s.y = o.y;
      s.h = newH;
    }
  } else if (drag.mode === "radius") {
    s.r = Math.max(8, Math.round(dist({x:s.cx,y:s.cy}, p)));
  } else if (drag.mode === "ellrx") {
    s.rx = Math.max(8, Math.round(Math.abs(p.x - s.cx)));
  } else if (drag.mode === "ellry") {
    s.ry = Math.max(8, Math.round(Math.abs(p.y - s.cy)));
  } else if (drag.mode === "nlL") {
    const right = o.x + o.w; s.x = snap(p.x); s.w = Math.max(60, right - s.x);
  } else if (drag.mode === "nlR") {
    s.w = Math.max(60, snap(p.x) - s.x);
  } else if (drag.mode === "bearingEnd") {
    const t = snapTarget(p, s.id, 16), q = t || p;
    const ex = q.x - s.cx, ey = q.y - s.cy;
    let ang = Math.atan2(ex, -ey) * 180/Math.PI; ang = ((ang % 360) + 360) % 360;
    const len = Math.hypot(ex, ey);
    if (t) { s.bearing = ang; s.lineLen = Math.max(20, len); }        // exact, so it sits flush on the target
    else { s.bearing = Math.round(ang); s.lineLen = Math.max(20, Math.round(len)); }  // free-drag snaps to whole degrees
  } else if (drag.mode === "anchor") {
    if (s.type === "text") { s.x = snap(p.x); s.y = snap(p.y); }
    else { s.cx = snap(p.x); s.cy = snap(p.y); }
  }
  render();
});

board.addEventListener("pointerup", () => {
  if (drag && drag.mode === "marquee") {
    const m = state.marquee;
    const r = { x:Math.min(m.x0,m.x1), y:Math.min(m.y0,m.y1), w:Math.abs(m.x1-m.x0), h:Math.abs(m.y1-m.y0) };
    state.marquee = null;
    if (r.w > 3 || r.h > 3) {
      const hits = state.shapes.filter(s => rectsIntersect(r, shapeBBox(s))).map(s => s.id);
      state.selectedIds = hits;
      state.selectedId = hits.length === 1 ? hits[0] : null;
    }
    render(); buildPanel();
  }
  drag = null;
});

function clone(o){ return JSON.parse(JSON.stringify(o)); }

function translate(s, o, dx, dy) {
  if (["rect","graph","tree","image","chart","parallel","venn","solid","numberline","table","barmodel","dice","tile"].includes(s.type)) { s.x = o.x+dx; s.y = o.y+dy; }
  else if (["circle","node","ellipse","compass","carc","clock","spinner","counter"].includes(s.type)) { s.cx = o.cx+dx; s.cy = o.cy+dy; }
  else if (s.type === "point") { s.cx = o.cx+dx; s.cy = o.cy+dy; }
  else if (s.type === "text") { s.x = o.x+dx; s.y = o.y+dy; }
  else { s.pts = o.pts.map(p => ({ x:p.x+dx, y:p.y+dy })); }
}

function resizeRect(s, o, idx, x, y) {
  // opposite corner stays fixed
  const corners = [[o.x,o.y],[o.x+o.w,o.y],[o.x+o.w,o.y+o.h],[o.x,o.y+o.h]];
  const opp = corners[(idx+2)%4];
  s.x = Math.min(x, opp[0]); s.y = Math.min(y, opp[1]);
  s.w = Math.max(10, Math.abs(x - opp[0])); s.h = Math.max(10, Math.abs(y - opp[1]));
}

/* ---------- delete key ---------- */
document.addEventListener("keydown", (e) => {
  if (modalOpen()) return;
  const inField = /INPUT|TEXTAREA/.test(document.activeElement.tagName);
  if ((e.ctrlKey || e.metaKey) && !inField) {
    const k = e.key.toLowerCase();
    if (k === "z" && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if ((k === "z" && e.shiftKey) || k === "y") { e.preventDefault(); redo(); return; }
    if (k === "d") { e.preventDefault(); duplicateSelection(); return; }
  }
  if ((e.key === "Delete" || e.key === "Backspace") && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)) {
    const ids = state.selectedIds.length ? state.selectedIds.slice() : (state.selectedId != null ? [state.selectedId] : []);
    if (!ids.length) return;
    state.shapes = state.shapes.filter(s => !ids.includes(s.id));
    state.selectedId = null; state.selectedIds = []; render(); buildPanel();
  }
});

/* ---------- properties panel ---------- */
const panel = document.getElementById("panel");
function buildPanel() {
  if (state.selectedIds.length > 1) {
    const n = state.selectedIds.length;
    const shs = state.selectedIds.map(getShape);
    const isGroup = shs.every(s => s && s.gid != null) && new Set(shs.map(s => s.gid)).size === 1;
    panel.innerHTML = `<h3>${isGroup ? "Group" : "Selection"}</h3>
      <div class="empty"><b>${n} items selected</b><br><br>${isGroup
        ? "These move together as a group. Ungroup to edit them separately."
        : "Group them so they move as one, or just press Delete to remove them."}</div>
      <button class="topbtn" id="multi-group" style="width:100%;margin-bottom:8px">${isGroup ? "Ungroup" : "Group together"}</button>
      <button class="danger" id="multi-del">Delete ${n} items</button>`;
    document.getElementById("multi-group").onclick = () => {
      if (isGroup) { shs.forEach(s => { delete s.gid; }); }
      else { const g = state.nextGid++; shs.forEach(s => { s.gid = g; }); }
      render(); buildPanel();
    };
    document.getElementById("multi-del").onclick = () => {
      const ids = state.selectedIds.slice();
      state.shapes = state.shapes.filter(s => !ids.includes(s.id));
      state.selectedId = null; state.selectedIds = []; render(); buildPanel();
    };
    return;
  }
  const s = getShape(state.selectedId);
  if (!s) {
    panel.innerHTML = `<div class="empty">Pick a tool on the left, then click the canvas to add a shape.<br><br><b>Select a shape</b> to label it and open the maths keyboard.<br><br>Drag a shape to move it, drag its handles to reshape. <b>Drag on empty canvas</b> to select several at once, then press <b>Delete</b>.</div>
      <h3 style="margin-top:20px">Canvas</h3>
      <div class="check"><input type="checkbox" id="cb-grid" ${state.showGrid?"checked":""}><label for="cb-grid">Show grid</label></div>
      <div class="check"><input type="checkbox" id="cb-axes" ${state.showAxes?"checked":""}><label for="cb-axes">Show x/y axes</label></div>
      <div class="check"><input type="checkbox" id="cb-snap" ${state.snap?"checked":""}><label for="cb-snap">Snap to grid</label></div>`;
    document.getElementById("cb-grid").onchange = e => { state.showGrid = e.target.checked; render(); };
    document.getElementById("cb-axes").onchange = e => { state.showAxes = e.target.checked; render(); };
    document.getElementById("cb-snap").onchange = e => { state.snap = e.target.checked; };
    return;
  }

  if (s.type === "graph") { buildGraphPanel(s); return; }
  if (s.type === "tree") { buildTreePanel(s); return; }
  if (s.type === "chart") { buildChartPanel(s); return; }
  if (s.type === "table") { buildTablePanel(s); return; }
  if (s.type === "barmodel") { buildBarModelPanel(s); return; }
  if (s.type === "clock") {
    panel.innerHTML = `<h3>Clock</h3>
      <div class="field"><label>Time</label><div class="row">
        <label class="cp-l">Hour <input type="number" id="cl-h" min="0" max="12" value="${s.hour}" style="width:48px"></label>
        <label class="cp-l">Min <input type="number" id="cl-m" min="0" max="59" value="${s.minute}" style="width:48px"></label>
        <label class="cp-l">Sec <input type="number" id="cl-s" min="0" max="59" value="${s.second||0}" style="width:48px"></label></div></div>

/* insert a Unicode maths glyph straight into the plain-text box (Text tool) */
function insertGlyphIntoText(glyph) {
  const input = document.getElementById("f-label");
  if (!input) return;
  const g = glyph.replace(/\s+/g, "");
  const start = input.selectionStart ?? input.value.length, end = input.selectionEnd ?? input.value.length;
  input.value = input.value.slice(0, start) + g + input.value.slice(end);
  const pos = start + g.length;
  input.focus(); input.setSelectionRange(pos, pos);
  const s = getShape(state.selectedId); if (s) { s.label = input.value; render(); }
}
/* insert a maths-keyboard symbol into the focused MathQuill field */
function mqInsert(snippet) {
  const f = activeMQ; if (!f) return;
  if (snippet === "\\frac{‸}{}") f.cmd("\\frac");
  else if (snippet === "\\sqrt{‸}") f.cmd("\\sqrt");
  else if (snippet === "\\sqrt[‸]{}") f.cmd("\\nthroot");
  else if (snippet === "ABS") f.typedText("|");
  else if (snippet === "\\left(‸\\right)") f.typedText("(");
  else if (snippet.endsWith("^{‸}")) { const base = snippet.slice(0, -4); if (base) f.write(base); f.cmd("^"); }
  else if (snippet.endsWith("_{‸}")) { const base = snippet.slice(0, -4); if (base) f.write(base); f.cmd("_"); }
  else if (/^\\[a-zA-Z]+$/.test(snippet)) f.cmd(snippet);
  else f.write(snippet.replace("‸", ""));
  f.focus();
}
