  on("sp-ptr","oninput", e => { s.pointer = +e.target.value; render(); });
  on("sp-col","oninput", e => { s.stroke = e.target.value; render(); });
  on("sp-del","onclick", () => { state.shapes = state.shapes.filter(x=>x.id!==s.id); state.selectedId=null; state.selectedIds=[]; render(); buildPanel(); });
}
function renderSpinnerSecs(s) {
  const box = document.getElementById("sp-secs"); if (!box) return;
  box.innerHTML = s.sectors.map((sec, i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:5px">
      <input type="color" id="sc-c-${i}" value="${sec.color}" style="width:28px;height:28px;padding:0;flex:none">
      <input type="text" id="sc-l-${i}" value="${esc(sec.label||"")}" placeholder="label" style="flex:1;min-width:0">
      <label class="cp-l">size <input type="number" id="sc-n-${i}" value="${sec.count}" min="1" max="12" style="width:46px"></label>
      <button data-del="${i}" style="border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;padding:4px 8px">×</button>
    </div>`).join("");
  s.sectors.forEach((sec, i) => {
    const c = document.getElementById(`sc-c-${i}`), l = document.getElementById(`sc-l-${i}`), n = document.getElementById(`sc-n-${i}`);
    if (c) c.oninput = () => { sec.color = c.value; render(); };
    if (l) l.oninput = () => { sec.label = l.value; render(); };
    if (n) n.oninput = () => { sec.count = Math.max(1, +n.value); render(); };
  });
  box.querySelectorAll("[data-del]").forEach(b => b.onclick = () => { s.sectors.splice(+b.getAttribute("data-del"), 1); renderSpinnerSecs(s); render(); });
}

/* ---------- export ---------- */
function serializeSVG(transparent) {
  const sel = state.selectedId, selIds = state.selectedIds, mq = state.marquee, grid = state.showGrid;
  state.selectedId = null; state.selectedIds = []; state.marquee = null; state.showGrid = false; // never export grid, handles or marquee
  exporting = true;
  render();
  const clone = board.cloneNode(true);
  exporting = false;
  state.selectedId = sel; state.selectedIds = selIds; state.marquee = mq; state.showGrid = grid; render();

  clone.setAttribute("xmlns", SVGNS);
  clone.removeAttribute("style");           // drop zoom sizing so export is always 1:1
  clone.setAttribute("width", W); clone.setAttribute("height", H);
  if (!transparent) {
    const bg = document.createElementNS(SVGNS, "rect");
    bg.setAttribute("x",0); bg.setAttribute("y",0);
    bg.setAttribute("width",W); bg.setAttribute("height",H); bg.setAttribute("fill","#ffffff");
    clone.insertBefore(bg, clone.firstChild);
  }
  return new XMLSerializer().serializeToString(clone);
}

function download(name, blob) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  a.click(); URL.revokeObjectURL(a.href);
}

document.getElementById("btn-svg").onclick = () => {
  download("figura-diagram.svg", new Blob([serializeSVG(true)], { type: "image/svg+xml" }));
};

function rasterize(scale, transparent) {
  return new Promise((resolve, reject) => {
    const svgStr = serializeSVG(transparent);
    const img = new Image();
    const url = URL.createObjectURL(new Blob([svgStr], { type: "image/svg+xml" }));
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = W*scale; c.height = H*scale;
      const ctx = c.getContext("2d");
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      resolve(c);
    };
    img.onerror = reject;
    img.src = url;
  });
}

document.getElementById("btn-png").onclick = () => {
  rasterize(3, true).then(c => c.toBlob(b => download("figura-diagram.png", b), "image/png"));
};

document.getElementById("btn-copy").onclick = () => {
  if (!navigator.clipboard || !window.ClipboardItem) return flash("Copy not supported — use Download PNG");
  rasterize(3, true).then(c => c.toBlob(async b => {
    try {
      await navigator.clipboard.write([new ClipboardItem({ "image/png": b })]);
      flash("Copied! Paste into Word with Ctrl+V");
    } catch (err) {
      flash("Copy blocked by browser — use Download PNG");
    }
  }, "image/png"));
};

/* ---------- multiple canvases (tabs) ---------- */
let docs = [{ name: "Canvas 1", shapes: [], nextId: 1, nextGid: 1, history: [], histIndex: -1 }];
let activeDoc = 0;

function syncToDoc() {
  const d = docs[activeDoc];
  d.shapes = state.shapes; d.nextId = state.nextId; d.nextGid = state.nextGid;
  d.history = history; d.histIndex = histIndex;
}
function loadFromDoc(i) {
  const d = docs[i];
  state.shapes = d.shapes || []; state.nextId = d.nextId || 1; state.nextGid = d.nextGid || 1;
  state.selectedId = null; state.selectedIds = []; state.marquee = null;
  history = d.history || []; histIndex = (d.histIndex == null ? -1 : d.histIndex);
  if (!history.length) recordHistory();
  updateUndoButtons();
}
function switchDoc(i) {
  if (i === activeDoc) return;
  syncToDoc(); activeDoc = i; loadFromDoc(i);
  render(); buildPanel(); renderTabs();
}
function addCanvas() {
  syncToDoc();
  docs.push({ name: "Canvas " + (docs.length + 1), shapes: [], nextId: 1, nextGid: 1, history: [], histIndex: -1 });
  activeDoc = docs.length - 1; loadFromDoc(activeDoc);
  render(); buildPanel(); renderTabs();
}
function deleteCanvas(i) {
  if (docs.length <= 1) return;
  uiConfirm('Delete "' + docs[i].name + '"?', () => {
    docs.splice(i, 1);
    if (activeDoc >= docs.length) activeDoc = docs.length - 1; else if (i < activeDoc) activeDoc--;
    loadFromDoc(activeDoc); render(); buildPanel(); renderTabs();
  });
}
function renameCanvas(i, name) { docs[i].name = name; renderTabs(); }
function duplicateCanvas(i) {
  syncToDoc();
  const src = docs[i];
  const copy = JSON.parse(JSON.stringify({ name: src.name + " copy", shapes: src.shapes, nextId: src.nextId, nextGid: src.nextGid }));
  copy.history = []; copy.histIndex = -1; copy.color = src.color || "";
  docs.splice(i + 1, 0, copy);
  activeDoc = i + 1; loadFromDoc(activeDoc); render(); buildPanel(); renderTabs();
}
function renderTabs() {
  const bar = document.getElementById("tabbar");
  bar.innerHTML = docs.map((d, i) => `<div class="tab${i===activeDoc?' active':''}" data-i="${i}"
      style="${d.color ? `border-top:3px solid ${d.color}` : ""}">
      <span class="tab-name">${esc(d.name)}</span>
      ${docs.length > 1 ? `<span class="tab-x" data-del="${i}" title="Delete canvas">×</span>` : ""}
    </div>`).join("") + `<button class="tab-add" id="tab-add" title="New canvas">+</button>`;
  bar.querySelectorAll(".tab").forEach(t => {
    const i = +t.getAttribute("data-i");
    t.onclick = (e) => { if (e.target.getAttribute("data-del") != null) return; switchDoc(i); };
    t.querySelector(".tab-name").ondblclick = () => uiPrompt("Rename canvas", docs[i].name, nn => { if (nn && nn.trim()) renameCanvas(i, nn.trim()); });
    t.oncontextmenu = (e) => { e.preventDefault(); openTabMenu(i, e.clientX, e.clientY); };
  });
  bar.querySelectorAll("[data-del]").forEach(x => x.onclick = (e) => { e.stopPropagation(); deleteCanvas(+x.getAttribute("data-del")); });
  document.getElementById("tab-add").onclick = addCanvas;
}

/* ---------- tab right-click menu ---------- */
const tabCtx = document.getElementById("tab-ctx");
const TAB_COLORS = ["", "#534ab7", "#1d9e75", "#d85a30", "#185fa5", "#993556", "#ba7517", "#5f5e5a"];
let ctxTab = 0;
document.getElementById("ctx-colors").innerHTML = TAB_COLORS.map(c =>
  `<span data-color="${c}" title="${c ? "Colour" : "No colour"}" style="background:${c || "#fff"};${c ? "" : "border:1px solid var(--border)"}">${c ? "" : "—"}</span>`).join("");
function openTabMenu(i, x, y) {
  ctxTab = i;
  tabCtx.style.display = "block";
  tabCtx.style.left = Math.min(x, window.innerWidth - 180) + "px";
  tabCtx.style.top = Math.min(y, window.innerHeight - 220) + "px";
}
function closeTabMenu() { tabCtx.style.display = "none"; }
tabCtx.querySelectorAll("[data-act]").forEach(b => b.onclick = () => {
  const act = b.getAttribute("data-act"); closeTabMenu();
  if (act === "rename") uiPrompt("Rename canvas", docs[ctxTab].name, nn => { if (nn && nn.trim()) renameCanvas(ctxTab, nn.trim()); });
  else if (act === "duplicate") duplicateCanvas(ctxTab);
  else if (act === "delete") deleteCanvas(ctxTab);
});
tabCtx.querySelectorAll("[data-color]").forEach(sw => sw.onclick = () => { docs[ctxTab].color = sw.getAttribute("data-color"); closeTabMenu(); renderTabs(); });
document.addEventListener("pointerdown", (e) => { if (!tabCtx.contains(e.target)) closeTabMenu(); });

/* ---------- duplicate ---------- */
function offsetShape(s, dx, dy) {
  if (s.type==="rect"||s.type==="graph"||s.type==="tree"||s.type==="image"||s.type==="text") { s.x+=dx; s.y+=dy; }
  else if (s.type==="circle"||s.type==="node"||s.type==="ellipse"||s.type==="point") { s.cx+=dx; s.cy+=dy; }
  else if (s.pts) s.pts = s.pts.map(p => ({ x:p.x+dx, y:p.y+dy }));
}
function duplicateSelection() {
  const ids = state.selectedIds.length ? state.selectedIds.slice() : (state.selectedId != null ? [state.selectedId] : []);
  if (!ids.length) return flash("Select something to duplicate first");
  const gidMap = {}, newIds = [];
  ids.forEach(id => {
    const orig = getShape(id); if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = state.nextId++;
    offsetShape(copy, 20, 20);
    if (copy.gid != null) { if (!(copy.gid in gidMap)) gidMap[copy.gid] = state.nextGid++; copy.gid = gidMap[copy.gid]; }
    state.shapes.push(copy); newIds.push(copy.id);
  });
  state.selectedIds = newIds; state.selectedId = newIds.length === 1 ? newIds[0] : null;
  render(); buildPanel();
}

/* ---------- save / load / backup ---------- */
function exportDocs() {
  syncToDoc();
  return docs.map(d => ({ name: d.name, shapes: d.shapes, nextId: d.nextId, nextGid: d.nextGid }));
}
function importDocs(arr) {
  docs = (arr || []).map(d => ({ name: d.name || "Canvas", shapes: d.shapes || [], nextId: d.nextId || 1, nextGid: d.nextGid || 1, history: [], histIndex: -1 }));
  if (!docs.length) docs = [{ name: "Canvas 1", shapes: [], nextId: 1, nextGid: 1, history: [], histIndex: -1 }];
  activeDoc = 0; loadFromDoc(0); render(); buildPanel(); renderTabs();
}
document.getElementById("btn-save").onclick = () => {
  try { localStorage.setItem("figura-project", JSON.stringify({ docs: exportDocs(), activeDoc })); flash("Saved to this browser"); }
  catch (e) { flash("Save failed — too large. Use Backup instead."); }
};
document.getElementById("btn-load").onclick = () => {
  const raw = localStorage.getItem("figura-project");
  if (!raw) return flash("Nothing saved yet");
  const data = JSON.parse(raw);
  if (data.docs) { importDocs(data.docs); if (data.activeDoc != null && data.activeDoc < docs.length) switchDoc(data.activeDoc); }
  else importDocs([{ name: "Canvas 1", shapes: data.shapes || [], nextId: data.nextId || 1, nextGid: 1 }]);
  flash("Loaded");
};
document.getElementById("btn-new").onclick = addCanvas;
document.getElementById("btn-dup").onclick = duplicateSelection;
document.getElementById("btn-image").onclick = importImage;

/* ---------- custom prompt dialog (replaces browser prompt) ---------- */
const promptModal = document.getElementById("prompt-modal");
const promptInput = document.getElementById("prompt-input");
let promptCb = null;
function uiPrompt(title, value, cb) {
  document.getElementById("prompt-title").textContent = title;
  promptInput.value = value || ""; promptCb = cb;
  promptModal.style.display = "flex";
  setTimeout(() => { promptInput.focus(); promptInput.select(); }, 0);
}
function promptDone(ok) {
  const v = promptInput.value; promptModal.style.display = "none";
  const cb = promptCb; promptCb = null; if (ok && cb) cb(v);
}
document.getElementById("prompt-ok").onclick = () => promptDone(true);
document.getElementById("prompt-cancel").onclick = () => promptDone(false);
promptInput.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); promptDone(true); } else if (e.key === "Escape") { e.preventDefault(); promptDone(false); } };
promptModal.onclick = (e) => { if (e.target === promptModal) promptDone(false); };

const confirmModal = document.getElementById("confirm-modal");
let confirmCb = null;
function uiConfirm(msg, cb) { document.getElementById("confirm-msg").textContent = msg; confirmCb = cb; confirmModal.style.display = "flex"; setTimeout(() => document.getElementById("confirm-ok").focus(), 0); }
function confirmDone(ok) { confirmModal.style.display = "none"; const cb = confirmCb; confirmCb = null; if (ok && cb) cb(); }
document.getElementById("confirm-ok").onclick = () => confirmDone(true);
document.getElementById("confirm-cancel").onclick = () => confirmDone(false);
confirmModal.onclick = (e) => { if (e.target === confirmModal) confirmDone(false); };
const modalOpen = () => promptModal.style.display === "flex" || confirmModal.style.display === "flex";
document.addEventListener("keydown", (e) => {
  if (confirmModal.style.display !== "flex") return;
  if (e.key === "Enter") { e.preventDefault(); confirmDone(true); }
  else if (e.key === "Escape") { e.preventDefault(); confirmDone(false); }
});

/* ---------- resizable toolbar ---------- */
const tbResizer = document.getElementById("toolbar-resizer");
let tbDrag = false;
tbResizer.addEventListener("pointerdown", (e) => { tbDrag = true; tbResizer.classList.add("dragging"); tbResizer.setPointerCapture(e.pointerId); e.preventDefault(); });
tbResizer.addEventListener("pointermove", (e) => {
  if (!tbDrag) return;
  const w = Math.max(64, Math.min(280, e.clientX - toolbar.getBoundingClientRect().left));
  toolbar.style.width = w + "px";
});
tbResizer.addEventListener("pointerup", () => { tbDrag = false; tbResizer.classList.remove("dragging"); });

const panelEl = document.getElementById("panel");
const pnResizer = document.getElementById("panel-resizer");
let pnDrag = false;
pnResizer.addEventListener("pointerdown", (e) => { pnDrag = true; pnResizer.classList.add("dragging"); pnResizer.setPointerCapture(e.pointerId); e.preventDefault(); });
pnResizer.addEventListener("pointermove", (e) => {
  if (!pnDrag) return;
  const w = Math.max(220, Math.min(520, panelEl.getBoundingClientRect().right - e.clientX));
  panelEl.style.width = w + "px";
});
pnResizer.addEventListener("pointerup", () => { pnDrag = false; pnResizer.classList.remove("dragging"); });

const hint = document.getElementById("hint");
let hintTimer;
function flash(msg) { hint.textContent = msg; hint.style.opacity = ".9"; clearTimeout(hintTimer); hintTimer = setTimeout(()=>hint.style.opacity="0", 1800); }
setTimeout(()=>hint.style.opacity="0", 4000);

/* ---------- zoom ---------- */
function setZoom(z) {
  state.zoom = Math.round(Math.max(0.25, Math.min(4, z)) * 100) / 100;
  board.style.width = (W * state.zoom) + "px";
  board.style.height = (H * state.zoom) + "px";
  const lbl = document.getElementById("zoom-label");
  if (lbl) lbl.textContent = Math.round(state.zoom * 100) + "%";
}
document.getElementById("zoom-in").onclick = () => setZoom(state.zoom + 0.1);
document.getElementById("zoom-out").onclick = () => setZoom(state.zoom - 0.1);
document.getElementById("zoom-reset").onclick = () => setZoom(1);
document.querySelector(".canvas-wrap").addEventListener("wheel", (e) => { if (e.ctrlKey) { e.preventDefault(); setZoom(state.zoom + (e.deltaY < 0 ? 0.15 : -0.15)); } }, { passive: false });

/* ---------- undo / redo ---------- */
let history = [], histIndex = -1, histTimer = null;
function snapDoc() { return JSON.stringify({ shapes: state.shapes, nextId: state.nextId, nextGid: state.nextGid }); }
function recordHistory() {
  const snap = snapDoc();
  if (history[histIndex] === snap) return;
  history = history.slice(0, histIndex + 1);
  history.push(snap); histIndex = history.length - 1;
  if (history.length > 120) { history.shift(); histIndex--; }
  updateUndoButtons();
}
function scheduleSnapshot() { clearTimeout(histTimer); histTimer = setTimeout(recordHistory, 350); }
function restoreDoc(snap) {
  const d = JSON.parse(snap);
  state.shapes = d.shapes || []; state.nextId = d.nextId || 1; state.nextGid = d.nextGid || 1;
  state.selectedId = null; state.selectedIds = []; state.marquee = null;
  render(); buildPanel();
}
function undo() { clearTimeout(histTimer); if (histIndex > 0) { histIndex--; restoreDoc(history[histIndex]); updateUndoButtons(); } }
function redo() { clearTimeout(histTimer); if (histIndex < history.length - 1) { histIndex++; restoreDoc(history[histIndex]); updateUndoButtons(); } }
function updateUndoButtons() {
  const u = document.getElementById("btn-undo"), r = document.getElementById("btn-redo");
  if (u) u.style.opacity = histIndex > 0 ? "1" : "0.4";
  if (r) r.style.opacity = histIndex < history.length - 1 ? "1" : "0.4";
}
document.getElementById("btn-undo").onclick = undo;
document.getElementById("btn-redo").onclick = redo;

/* ---------- math readiness ---------- */
if (window.MathJax && window.MathJax.startup && MathJax.startup.promise) {
  MathJax.startup.promise.then(() => { mathReady = true; render(); });
}

/* ---------- go ---------- */
setZoom(1);
render(); buildPanel();
recordHistory();
renderTabs();
</script>
